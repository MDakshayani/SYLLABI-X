<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SyllabiX – Generate Smart Curriculums</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
      (function() {
        const color = localStorage.getItem('curriculum-ai-accent-color');
        if (color) {
          document.documentElement.style.setProperty('--custom-accent-color', color);
          document.documentElement.style.setProperty('--custom-accent-color-hover', color);
          document.documentElement.style.setProperty('--primary-color-val', color);
        }
        const theme = localStorage.getItem('curriculum-ai-theme') || 'system';
        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
